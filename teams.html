<script src="js/data.js"></script>
<script>
function toggleNav() { document.getElementById('nav-links').classList.toggle('open'); }

function teamLogo(team) {
  const map = { 'Toronto':'toronto','Philadelphia':'philadelphia','Los Angeles':'losangeles','Dallas':'dallas' };
  return `logos/${map[team]}.svg`;
}

function streakDots(team, schedule, seasonType) {
  // Filter by season type if provided
  let filtered = schedule.filter(g => g.Status !== 'Upcoming' && (g.Home === team || g.Away === team));
  if (seasonType === 'playoff') filtered = filtered.filter(g => Number(g.Playoff||0) === 1);
  else if (seasonType === 'regular') filtered = filtered.filter(g => Number(g.Playoff||0) === 0);
  const games = filtered.slice(-5);
  const count = games.length;
  const dots = games.map(g => {
    const isTie = g.Status === 'Tie' || (Number(g.HomeScore) === Number(g.AwayScore) && g.HomeScore !== '');
    const won = !isTie && ((g.Home === team && Number(g.HomeScore) > Number(g.AwayScore)) || (g.Away === team && Number(g.AwayScore) > Number(g.HomeScore)));
    const color = won ? '#22c55e' : isTie ? '#ffc949' : 'rgb(255,0,0)';
    const label = won ? 'W' : isTie ? 'T' : 'L';
    return `<span class="streak-dot" style="background:${color};" title="${label}"></span>`;
  }).join('');
  return { dots, count };
}

let _teamsData = null;
let _teamsSeason = 'regular';
let _rrData = {};

function setTeamsSeason(type, btn) {
  _teamsSeason = type;
  document.querySelectorAll('#teams-season-toggle .s-btn').forEach(b => {
    b.className = 's-btn' + (b === btn ? (type === 'playoff' ? ' active-playoff' : type === 'all' ? ' active-combined' : ' active') : '');
  });
  renderTeams();
}

function h2hRecord(team, opponent, schedule, seasonType) {
  let games = schedule.filter(g =>
    g.Status !== 'Upcoming' &&
    ((g.Home === team && g.Away === opponent) || (g.Home === opponent && g.Away === team))
  );
  if (seasonType === 'playoff') games = games.filter(g => Number(g.Playoff||0) === 1);
  else if (seasonType === 'regular') games = games.filter(g => Number(g.Playoff||0) === 0);

  let w=0, l=0, t=0;
  games.forEach(g => {
    const isTie = g.Status === 'Tie' || (Number(g.HomeScore) === Number(g.AwayScore) && g.HomeScore !== '');
    const teamScored = g.Home === team ? Number(g.HomeScore) : Number(g.AwayScore);
    const oppScored  = g.Home === team ? Number(g.AwayScore)  : Number(g.HomeScore);
    if (isTie) t++;
    else if (teamScored > oppScored) w++;
    else l++;
  });
  return { w, l, t, gp: w+l+t };
}

function renderTeams() {
  const { roster, gameStats, schedule } = _teamsData;
  const teams = buildTeams(schedule, _teamsSeason);
  const skaterRoster = (roster||[]).filter(p => (p.Pos||"").toUpperCase() !== "G");
  const skaters = aggregateSkaters(skaterRoster, gameStats, schedule, _teamsSeason);
  const goalieRoster = (roster||[]).filter(p => (p.Pos||"").toUpperCase() === "G");
  const goalies = aggregateGoalies(goalieRoster, gameStats, schedule, _teamsSeason);
  const allTeamNames = TEAM_NAMES;
  const isPlayoff = _teamsSeason === 'playoff';

  // In playoff mode sort by Round Robin pts if available
  let sorted;
  if (isPlayoff && _rrData && Object.keys(_rrData).length) {
    sorted = [...teams].map(t => ({...t, RRPTS: Number(_rrData[t.Team]||0), DIFF: (t.GF||0)-(t.GA||0)}))
      .sort((a,b) => b.RRPTS - a.RRPTS || b.W - a.W || b.PTS - a.PTS || b.DIFF - a.DIFF);
  } else {
    sorted = standingsSort(teams, schedule, skaters, goalies);
  }

  document.getElementById('teams-list').innerHTML = sorted.map((t,i) => {
    const diff = t.GF - t.GA;
    const suffix = i === 0 ? 'st' : i === 1 ? 'nd' : i === 2 ? 'rd' : 'th';

    // Head-to-head records vs all other teams
    const opponents = allTeamNames.filter(n => n !== t.Team);
    const h2hRows = opponents.map((opp, idx) => {
      const rec = h2hRecord(t.Team, opp, schedule, _teamsSeason);
      const color = TEAM_COLORS[opp]?.primary || '#999';
      const gdot = '<span style="width:2px;height:2px;border-radius:50%;background:#9ca3af;display:inline-block;margin:0 4px;vertical-align:middle;"></span>';
      let recStr;
      if (rec.gp === 0) {
        recStr = '<span style="color:var(--text-muted);">–</span>';
      } else {
        recStr = '<span style="color:#16a34a;">' + rec.w + 'W</span>' + gdot +
                 '<span style="color:#dc2626;">' + rec.l + 'L</span>' +
                 (rec.t > 0 ? gdot + '<span style="color:#d7a557;">' + rec.t + 'T</span>' : '');
      }
      const borderTop = idx > 0 ? 'border-top:1px solid var(--border);' : '';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.35rem 0;' + borderTop + '">' +
        '<div style="display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;">' +
          '<span style="width:8px;height:8px;border-radius:50%;background:' + color + ';display:inline-block;flex-shrink:0;"></span>' +
          '<a href="roster.html?team=' + encodeURIComponent(opp) + '" style="color:var(--text);text-decoration:none;" onmouseover="this.style.color=\'#1e40af\'" onmouseout="this.style.color=\'var(--text)\'">' + opp + '</a>' +
        '</div>' +
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:15px;font-weight:400;">' + recStr + '</div>' +
      '</div>';
    }).join('');

    return `
    <div class="team-card">
      <div class="team-card-header">
        <a href="roster.html?team=${encodeURIComponent(t.Team)}"><img src="${teamLogo(t.Team)}" alt="${t.Team}" style="width:180px;height:180px;display:block;"/></a>
        <div style="flex:1;">
          <div class="team-card-title">${t.Team}</div>
          <div class="team-card-record">${t.W}W · ${t.L}L · ${t.T ?? 0}T · <strong>${isPlayoff && _rrData ? (Number(_rrData[t.Team]||0)) + ' round robin pts' : t.PTS + ' pts'}</strong></div>
          <div class="streak-row" style="margin-top:6px;">
            ${(() => { const s = streakDots(t.Team, _teamsData.schedule, _teamsSeason); return `${s.dots}<span style="font-size:11px;color:var(--text-muted);margin-left:4px;">Last ${s.count}</span>`; })()}
          </div>
        </div>
        <div class="team-card-rank">
          <div class="team-card-rank-num">${i+1}<sup style="font-size:14px;">${suffix}</sup></div>
          <div class="team-card-rank-lbl">in league</div>
        </div>
      </div>
      <div class="team-stats-row">
        <div class="tstat"><span class="tstat-val">${t.GF}</span><span class="tstat-lbl">Goals For</span></div>
        <div class="tstat"><span class="tstat-val">${t.GA}</span><span class="tstat-lbl">Goals Against</span></div>
        <div class="tstat"><span class="tstat-val" style="color:${diff>=0?'#16a34a':'#dc2626'}">${diff>0?'+':''}${diff}</span><span class="tstat-lbl">Differential</span></div>
      </div>
      <div style="padding:0.75rem 1rem;">
        <div style="font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem;">Head-to-Head</div>
        ${h2hRows}
      </div>
      <div class="team-card-footer">
        <a href="roster.html?team=${encodeURIComponent(t.Team)}" class="tc-btn">Roster →</a>
        <a href="stats.html?team=${encodeURIComponent(t.Team)}" class="tc-btn">Stats →</a>
        <a href="schedule.html?team=${encodeURIComponent(t.Team)}" class="tc-btn">Schedule →</a>
      </div>
    </div>`;
  }).join('');
}

async function init() {
  const data = await loadData();
  _teamsData = data;
  _rrData = await fetchRoundRobin();
  renderTeams();
}
init();

  // Apply dynamic season label from Google Sheet
  fetchSeason().then(s => {
    const label = s + ' Season';
    document.querySelectorAll('.season-label').forEach(el => el.textContent = label);
  });

  // Show Awards nav link — cached in sessionStorage for performance
  (async () => {
    try {
      const link = document.getElementById('awards-nav-link');
      if (!link) return;
      const cached = sessionStorage.getItem('vahl_awards_show');
      if (cached !== null) {
        if (cached === '1') link.style.display = '';
        return;
      }
      const data = await loadData();
      const regWin = await fetchRegistrationWindow();
      const today = new Date(); today.setHours(0,0,0,0);
      const regStart = regWin && regWin.StartDate ? new Date(regWin.StartDate + 'T00:00:00') : null;
      const regOpen = regStart && today >= regStart;
      const regularGames = data.schedule.filter(g => Number(g.Playoff||0) === 0);
      const regularDone = regularGames.length > 0 && regularGames.every(g => g.Status !== 'Upcoming');
      const show = regularDone && !regOpen;
      sessionStorage.setItem('vahl_awards_show', show ? '1' : '0');
      if (show) link.style.display = '';
    } catch(e) {}
  })();
</script>
