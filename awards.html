    .award-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1.25rem;
    }
    .award-icon {
      font-size: 36px;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 2px;
    }
    .award-body { flex: 1; min-width: 0; }
    .award-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);

      font-size: 13px;

      display: inline-block;

      background: #eff6ff;

      border-radius: 20px;
      padding: 4px 12px;

      font-weight: 500;
      color: #1e40af;

      font-size: 15px;
      font-style: italic;
      padding: 2rem 0;
      text-align: center;
    }
    @media (max-width: 640px) {
      .award-card { flex-direction: column; gap: 0.75rem; }
      .award-icon { font-size: 28px; }
      .award-winner { font-size: 22px; }
    }
  </style>
  <script>
    (function() {
      var s = sessionStorage.getItem('vahl_season_label');
      if (!s) return; // No cache yet — async fetch will update after load
      // Hide before paint so the placeholder never shows
      document.write('<style>.season-label{visibility:hidden}</style>');
      // Reveal with correct text as soon as DOM is ready
      function applyLabel() {
        document.querySelectorAll('.season-label').forEach(function(el) {
          el.textContent = s;
          el.style.visibility = '';
        });
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyLabel);
      } else {
        applyLabel();
      }
    })();
  </script>

<main class="container">
  <div class="page-header">
    <p class="eyebrow"><span class="season-label">2025-26 Season</span></p>
    <h1 class="page-title">Awards</h1>
    <p class="page-sub">Season honours and individual awards</p>

  <div id="loading" style="padding:2rem 0;color:var(--text-muted);">Loading awards data…</div>

      <button class="s-btn" onclick="setAwardsSeason('playoff',this)">Playoffs</button>

<footer class="site-footer">

<script src="js/data.js"></script>
<script>
function toggleNav() { document.getElementById('nav-links').classList.toggle('open'); }

let _awardsData = null;
let _awardsSeason = 'regular';

function setAwardsSeason(type, btn) {
  _awardsSeason = type;
  document.querySelectorAll('#awards-toggle .s-btn').forEach(b => {
    b.className = 's-btn' + (b === btn ? (type === 'playoff' ? ' active-playoff' : ' active') : '');
  });
  document.getElementById('regular-awards').style.display = type === 'regular' ? '' : 'none';
  document.getElementById('playoff-awards').style.display  = type === 'playoff'  ? '' : 'none';
}

function playerLink(name, team) {
  return `<a href="player.html?name=${encodeURIComponent(name)}&team=${encodeURIComponent(team)}">${name}</a>`;
}

function teamDotHtml(team) {
  const color = TEAM_COLORS[team]?.primary || '#999';
  return `<span class="award-team-dot" style="background:${color};"></span>`;
}

function awardCard(icon, name, desc, winnerHtml, subHtml) {
  return `
    <div class="award-card">
      <div class="award-icon">${icon}</div>
      <div class="award-body">
        <div class="award-name">${name}</div>
        <div class="award-desc">${desc}</div>
        <div class="award-winner">${winnerHtml}</div>
        ${subHtml ? `<div class="award-winner-sub">${subHtml}</div>` : ''}
      </div>
    </div>`;
}

function buildRegularAwards(data) {
  const { roster, gameStats, schedule } = data;

  const skaterRoster = (roster||[]).filter(p => (p.Pos||"").toUpperCase() !== "G");
  const skaters = aggregateSkaters(skaterRoster, gameStats, schedule, 'regular');
  const goalieRoster = (roster||[]).filter(p => (p.Pos||"").toUpperCase() === "G");
  const goalies = aggregateGoalies(goalieRoster, gameStats, schedule, 'regular');
  const teams   = buildTeams(schedule, 'regular');
  const sorted  = standingsSort(teams, schedule, skaters, goalies);

  let html = '';

  // 1. President's Trophy — 1st place team
  const first = sorted[0];
  if (first) {
    html += awardCard('🏆', "President's Trophy",
      'Awarded to the team that finishes first overall in the regular season standings.',
      `${teamDotHtml(first.Team)}<a href="roster.html?team=${encodeURIComponent(first.Team)}">${first.Team}</a>`,
      `${first.W}W · ${first.L}L · ${first.T}T · ${first.PTS} pts`
    );
  }

  // Helper: render one or more winners
  function winnersHtml(winners, statLine) {
    if (winners.length === 1) {
      const p = winners[0];
      return { winner: `${teamDotHtml(p.Team)}${playerLink(p.Name, p.Team)}`, sub: statLine(p) };
    }
    const winnerStr = winners.map(p =>
      `<div style="margin-bottom:4px;">${teamDotHtml(p.Team)}${playerLink(p.Name, p.Team)}<span style="font-size:13px;color:var(--text-muted);margin-left:6px;">${statLine(p)}</span></div>`
    ).join('');
    return { winner: winnerStr, sub: 'Tied award — shared by ' + winners.length + ' players' };
  }

  // Helper: apply PIM tiebreaker then return all still-tied players
  function breakTieByPIM(candidates) {
    const minPIM = Math.min(...candidates.map(p => Number(p.PIM || 0)));
    return candidates.filter(p => Number(p.PIM || 0) === minPIM);
  }

  // 2. Maurice "Rocket" Richard Trophy — Most goals, tiebreaker: fewest PIM
  const sortedGoals = [...skaters].sort((a,b) => b.G - a.G);
  const topGoalsVal = sortedGoals[0]?.G || 0;
  const topGoalsTied = sortedGoals.filter(p => p.G === topGoalsVal && topGoalsVal > 0);
  const topGoalsWinners = breakTieByPIM(topGoalsTied);
  if (topGoalsWinners.length) {
    const w = winnersHtml(topGoalsWinners, p => `${p.G}G · ${p.PIM} PIM · ${p.Team}`);
    html += awardCard('🎯', 'Maurice "Rocket" Richard Trophy',
      'Awarded to the player(s) with the most goals. Tiebreaker: fewest penalty minutes.',
      w.winner, w.sub);
  }

  // 3. Art Ross Trophy — Most points, tiebreaker: most goals then fewest PIM
  const sortedPts = [...skaters].sort((a,b) => b.PTS - a.PTS);
  const topPtsVal = sortedPts[0]?.PTS || 0;
  const topPtsTied = sortedPts.filter(p => p.PTS === topPtsVal && topPtsVal > 0);
  // Tiebreaker 1: most goals
  const topPtsMaxG = Math.max(...topPtsTied.map(p => p.G));
  const topPtsAfterG = topPtsTied.filter(p => p.G === topPtsMaxG);
  // Tiebreaker 2: fewest PIM
  const topPtsWinners = breakTieByPIM(topPtsAfterG);
  if (topPtsWinners.length) {
    const w = winnersHtml(topPtsWinners, p => `${p.PTS} pts (${p.G}G + ${p.A}A) · ${p.PIM} PIM · ${p.Team}`);
    html += awardCard('📊', 'Art Ross Trophy',
      'Awarded to the player(s) with the most points. Tiebreaker: most goals, then fewest penalty minutes.',
      w.winner, w.sub);
  }

  // 4. James Norris Memorial Trophy — D-man most points, tiebreaker: most goals then fewest PIM
  const defencemen = skaters.filter(p => p.Pos === 'D');
  const sortedDef = [...defencemen].sort((a,b) => b.PTS - a.PTS);
  const topDefVal = sortedDef[0]?.PTS || 0;
  const topDefTied = sortedDef.filter(p => p.PTS === topDefVal && topDefVal > 0);
  const topDefMaxG = Math.max(...topDefTied.map(p => p.G));
  const topDefAfterG = topDefTied.filter(p => p.G === topDefMaxG);
  const topDefWinners = breakTieByPIM(topDefAfterG);
  if (topDefWinners.length) {
    const w = winnersHtml(topDefWinners, p => `${p.PTS} pts (${p.G}G + ${p.A}A) · ${p.PIM} PIM · Defence · ${p.Team}`);
    html += awardCard('🛡️', 'James Norris Memorial Trophy',
      'Awarded to the defenceman(s) with the most points. Tiebreaker: most goals, then fewest penalty minutes.',
      w.winner, w.sub);
  } else {
    html += awardCard('🛡️', 'James Norris Memorial Trophy',
      'Awarded to the defenceman with the most points in the regular season.',
      '<span style="color:var(--text-muted);">No defencemen found in roster</span>', '');
  }

  // 5. Vezina Trophy — Lowest GAA (min 12 GP), tiebreaker: W then SO then fewest PIM
  // GAA is compared rounded to 2 decimal places to avoid float precision issues
  // (e.g. 59/20=2.9500 and 56/19=2.9473 both display as 2.95 but differ as floats)
  const eligibleGoalies = goalies.filter(g => (g.W + g.L + g.T) >= 12);
  if (eligibleGoalies.length === 0) {
    html += awardCard('🥅', 'Vezina Trophy',
      'Awarded to the goalie with the lowest GAA (minimum 12 games played). Tiebreaker: most wins, most shutouts, fewest PIM.',
      '<span style="color:var(--text-muted);">No goalies have played the minimum 12 games yet</span>', '');
  } else {
    const sortedGoalies = [...eligibleGoalies].sort((a,b) => {
      const aGAA = Math.round(a.GAA * 100);
      const bGAA = Math.round(b.GAA * 100);
      if (aGAA !== bGAA) return aGAA - bGAA;
      if (b.W !== a.W) return b.W - a.W;
      if (b.SO !== a.SO) return b.SO - a.SO;
      return Number(a.PIM||0) - Number(b.PIM||0);
    });
    const topGAA = Math.round(sortedGoalies[0].GAA * 100);
    let vezinaWinners = sortedGoalies.filter(g => Math.round(g.GAA * 100) === topGAA);
    if (vezinaWinners.length > 1) {
      const maxW = Math.max(...vezinaWinners.map(g => g.W));
      vezinaWinners = vezinaWinners.filter(g => g.W === maxW);
    }
    if (vezinaWinners.length > 1) {
      const maxSO = Math.max(...vezinaWinners.map(g => g.SO));
      vezinaWinners = vezinaWinners.filter(g => g.SO === maxSO);
    }
    if (vezinaWinners.length > 1) {
      const minPIM = Math.min(...vezinaWinners.map(g => Number(g.PIM||0)));
      vezinaWinners = vezinaWinners.filter(g => Number(g.PIM||0) === minPIM);
    }
    if (vezinaWinners.length === 1) {
      const g = vezinaWinners[0];
      html += awardCard('🥅', 'Vezina Trophy',
        'Awarded to the goalie with the lowest GAA (minimum 12 games played). Tiebreaker: most wins, most shutouts, fewest PIM.',
        `${teamDotHtml(g.Team)}<a href="player.html?name=${encodeURIComponent(g.Name)}&team=${encodeURIComponent(g.Team)}&type=goalie">${g.Name}</a>`,
        `${g.GAA.toFixed(2)} GAA · ${g.W}W · ${g.SO} SO · ${g.Team}`
      );
    } else {
      const winnerStr = vezinaWinners.map(g =>
        `<div style="margin-bottom:4px;">${teamDotHtml(g.Team)}<a href="player.html?name=${encodeURIComponent(g.Name)}&team=${encodeURIComponent(g.Team)}&type=goalie">${g.Name}</a><span style="font-size:13px;color:var(--text-muted);margin-left:6px;">${g.GAA.toFixed(2)} GAA · ${g.W}W · ${g.SO} SO · ${g.Team}</span></div>`
      ).join('');
      html += awardCard('🥅', 'Vezina Trophy',
        'Awarded to the goalie with the lowest GAA (minimum 12 games played). Tiebreaker: most wins, most shutouts, fewest PIM.',
        winnerStr, 'Tied award — shared by ' + vezinaWinners.length + ' goalies'
      );
    }
  }

  // 6. Lady Byng — All players with 0 PIM
  const ladyByng = [...skaters].filter(p => Number(p.PIM) === 0 && (p.G > 0 || p.A > 0))
    .sort((a,b) => b.PTS - a.PTS || a.Name.localeCompare(b.Name));
  const ladyByngAll = [...skaters].filter(p => Number(p.PIM) === 0)
    .sort((a,b) => b.PTS - a.PTS || a.Name.localeCompare(b.Name));
  const listed = ladyByngAll.length > 0 ? ladyByngAll : [];
  const ladyByngHtml = listed.length > 0
    ? `<div class="lady-byng-list">${listed.map(p =>
        `<span class="lady-byng-player">${teamDotHtml(p.Team)}${p.Name}</span>`
      ).join('')}</div>`
    : '<span style="color:var(--text-muted);">No players with zero penalty minutes</span>';

  html += awardCard('🤝', 'Lady Byng Trophy',
    'Awarded to all players who played the regular season with zero penalty minutes.',
    ladyByngHtml,
    listed.length > 0 ? `${listed.length} player${listed.length !== 1 ? 's' : ''} with 0 PIM this season` : ''
  );

  document.getElementById('regular-awards').innerHTML = html;
}

async function buildPlayoffAwards(data, rrData) {
  const { roster, gameStats, schedule } = data;

  const playoffGames = schedule.filter(g => Number(g.Playoff||0) === 1);
  const allPlayoffPlayed = playoffGames.length > 0 && playoffGames.every(g => g.Status !== 'Upcoming');

  if (!allPlayoffPlayed) {
    document.getElementById('playoff-awards').innerHTML =
      '<p class="not-available">Playoff awards will be available once all playoff games have been played.</p>';
    return;
  }

  let html = '';

  // Fetch champion from Misc tab
  let champTeam = await fetchChampion();

  // 1. VAHL Champions
  if (champTeam) {
    html += awardCard('🏒', 'VAHL Champions',
      'Awarded to the team that wins the championship final.',
      `${teamDotHtml(champTeam)}<a href="roster.html?team=${encodeURIComponent(champTeam)}">${champTeam}</a>`,
      'VAHL Champions'
    );
  } else {
    html += awardCard('🏒', 'VAHL Champions',
      'Awarded to the team that wins the championship final.',
      '<span style="color:var(--text-muted);">Not yet determined — update Champions tab in Google Sheet</span>', '');
  }

  // 2. Conn Smythe — Most playoff points, tiebreaker: most goals then fewest PIM
  const playoffSkaters = aggregateSkaters(roster, gameStats, schedule, 'playoff');
  const sortedConn = [...playoffSkaters].sort((a,b) => b.PTS - a.PTS);
  const connVal = sortedConn[0]?.PTS || 0;
  const connTied = sortedConn.filter(p => p.PTS === connVal && connVal > 0);
  const connMaxG = connTied.length ? Math.max(...connTied.map(p => p.G)) : 0;
  const connAfterG = connTied.filter(p => p.G === connMaxG);
  const connMinPIM = connAfterG.length ? Math.min(...connAfterG.map(p => Number(p.PIM||0))) : 0;
  const connWinners = connAfterG.filter(p => Number(p.PIM||0) === connMinPIM);
  if (connWinners.length) {
    const w = connWinners.length === 1
      ? { winner: `${teamDotHtml(connWinners[0].Team)}${playerLink(connWinners[0].Name, connWinners[0].Team)}`,
          sub: `${connWinners[0].PTS} playoff pts (${connWinners[0].G}G + ${connWinners[0].A}A) · ${connWinners[0].PIM} PIM · ${connWinners[0].Team}` }
      : { winner: connWinners.map(p => `<div style="margin-bottom:4px;">${teamDotHtml(p.Team)}${playerLink(p.Name, p.Team)}<span style="font-size:13px;color:var(--text-muted);margin-left:6px;">${p.PTS} pts (${p.G}G + ${p.A}A) · ${p.PIM} PIM · ${p.Team}</span></div>`).join(''),
          sub: 'Tied award — shared by ' + connWinners.length + ' players' };
    html += awardCard('🌟', 'Conn Smythe Trophy',
      'Awarded to the most valuable player of the playoffs with the most points. Tiebreaker: most goals, then fewest penalty minutes.',
      w.winner, w.sub);
  } else {
    html += awardCard('🌟', 'Conn Smythe Trophy',
      'Awarded to the most valuable player of the playoffs.',
      '<span style="color:var(--text-muted);">No playoff stats recorded yet</span>', '');
  }

  // 3. Prince of Wales — 1st in Round Robin (most RRPTS)
  if (rrData && Object.keys(rrData).length) {
    const rrSorted = Object.entries(rrData)
      .map(([team, pts]) => ({ team, pts: Number(pts) }))
      .sort((a,b) => b.pts - a.pts);
    const wales = rrSorted[0];
    if (wales) {
      html += awardCard('👑', 'Prince of Wales Trophy',
        'Awarded to the team that finishes first in the round robin standings.',
        `${teamDotHtml(wales.team)}<a href="roster.html?team=${encodeURIComponent(wales.team)}">${wales.team}</a>`,
        `${wales.pts} round robin pts`
      );
    }
  } else {
    html += awardCard('👑', 'Prince of Wales Trophy',
      'Awarded to the team that finishes first in the round robin standings.',
      '<span style="color:var(--text-muted);">Round Robin points not yet available</span>', '');
  }

  document.getElementById('playoff-awards').innerHTML = html;
}

async function init() {
  try {
    const data = await loadData();
  const rrData = data.roundRobin || {};
    _awardsData = data;

    const { schedule } = data;
    const regularGames = schedule.filter(g => Number(g.Playoff||0) === 0);
    const regularDone  = regularGames.length > 0 && regularGames.every(g => g.Status !== 'Upcoming');

    document.getElementById('loading').style.display = 'none';

    if (!regularDone) {
      document.getElementById('no-data').style.display = '';
      return;
    }

    document.getElementById('content').style.display = '';
    buildRegularAwards(data);
    await buildPlayoffAwards(data, rrData);

    // Show/hide playoff toggle based on whether any playoff games exist
    const playoffGames = schedule.filter(g => Number(g.Playoff||0) === 1);
    if (playoffGames.length === 0) {
      document.getElementById('awards-toggle').style.display = 'none';
    }

  } catch(e) {
    console.error('Awards error:', e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('no-data').style.display = '';
  } finally {
    const loadingEl = document.getElementById('loading');
    if (loadingEl) loadingEl.style.display = 'none';
  }

  // Apply season label
  fetchSeason().then(s => {
    const label = s + ' Season';
    document.querySelectorAll('.season-label').forEach(el => el.textContent = label);
  });
}

init();
</script>
