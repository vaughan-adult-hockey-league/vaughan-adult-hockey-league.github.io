<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roster — VAHL</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png"/>
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png"/>
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png"/>
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120x120.png"/>
  <link rel="manifest" href="site.webmanifest"/>
  <meta name="theme-color" content="#1e40af"/>
  <meta name="msapplication-TileColor" content="#1e40af"/>
  <meta name="msapplication-TileImage" content="icons/icon-144x144.png"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="site-nav">
  <div class="container nav-inner">
    <a class="nav-logo" href="index.html"><img src="logos/vahl-logo.jpg" alt="VAHL"/>VAHL</a>
    <button class="nav-burger" onclick="toggleNav()" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-links" id="nav-links">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="teams.html">Teams</a>
      <a class="nav-link" href="schedule.html">Schedule/Results</a>
      <a class="nav-link" href="stats.html">Stats</a>
      <a class="nav-link" href="handouts.html">Handouts</a>
      <a class="nav-link" href="registration.html">Registration</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<main class="container">
  <div class="page-header">
    <p class="eyebrow"><span class="season-label">2026–27 Season</span></p>
    <h1 class="page-title" id="page-title">Roster</h1>
  </div>

  <div class="team-switcher" id="team-switcher"></div>

  <div class="roster-hero" id="roster-hero"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.5rem;">
    <p class="section-label" style="margin:0;">Skaters</p>
    <div class="season-toggle" style="margin:0;" id="roster-season-toggle">
      <button class="s-btn active" onclick="setRosterSeason('regular',this)">Regular Season</button>
      <button class="s-btn" onclick="setRosterSeason('playoff',this)">Playoffs</button>
      <button class="s-btn" onclick="setRosterSeason('all',this)">Combined</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:1.5rem;overflow-x:auto;">
    <table class="data-table" id="skaters-table" style="min-width:420px;">
      <thead>
        <tr>
          <th class="left" style="width:36px;">#</th>
          <th class="left" style="width:160px;">Player</th>
          <th style="width:52px;" data-col="pos" data-label="Pos">Pos</th>
          <th style="width:48px;" data-col="g" data-label="G">G</th>
          <th style="width:48px;" data-col="a" data-label="A">A</th>
          <th style="width:48px;" data-col="pts" data-label="PTS" class="sorted">PTS ↓</th>
          <th style="width:48px;" data-col="pim" data-label="PIM">PIM</th>
        </tr>
      </thead>
      <tbody id="skaters-body"></tbody>
      <tfoot id="skaters-foot"></tfoot>
    </table>
  </div>

  <p class="section-label">Goaltenders</p>
  <div class="card" style="overflow-x:auto;">
    <table class="data-table" style="min-width:480px;">
      <thead>
        <tr>
          <th class="left" style="width:36px;">#</th>
          <th class="left" style="width:150px;">Player</th>
          <th style="width:44px;">W</th>
          <th style="width:44px;">L</th>
          <th style="width:44px;">T</th>
          <th style="width:44px;">GA</th>
          <th style="width:52px;">GAA</th>
          <th style="width:44px;">SO</th>
          <th style="width:44px;">PIM</th>
        </tr>
      </thead>
      <tbody id="goalies-body"></tbody>
      <tfoot id="goalies-foot"></tfoot>
    </table>
  </div>
</main>

<footer class="site-footer"><div class="container">Vaughan Adult Hockey League · <span class="season-label">2026–27 Season</span></div></footer>

<script src="js/data.js"></script>
<script>
function toggleNav() { document.getElementById('nav-links').classList.toggle('open'); }

function teamLogo(team) {
  const map = { 'Toronto':'toronto','Philadelphia':'philadelphia','Los Angeles':'losangeles','Dallas':'dallas' };
  return `logos/${map[team]}.svg`;
}

const TEAMS = ['Toronto','Philadelphia','Los Angeles','Dallas'];

let _rosterData = null;
let _rosterSeason = 'regular';
let _activeRosterTeam = 'Toronto';

function setRosterSeason(type, btn) {
  _rosterSeason = type;
  document.querySelectorAll('#roster-season-toggle .s-btn').forEach(b => {
    b.className = 's-btn' + (b === btn ? (type === 'playoff' ? ' active-playoff' : type === 'all' ? ' active-combined' : ' active') : '');
  });
  renderTeam(_activeRosterTeam, _rosterData);
}

async function renderTeam(team, data) {
  _activeRosterTeam = team;
  const { roster, goalieRoster, gameStats, goalieStats, schedule } = data;

  // Re-aggregate based on current season type
  const skaters = aggregateSkaters(roster, gameStats, schedule, _rosterSeason);
  const goalies = aggregateGoalies(goalieRoster, goalieStats, schedule, _rosterSeason);
  const teams   = buildTeams(schedule, _rosterSeason);

  const teamData = teams.find(t => t.Team === team) || {};
  const diff = (teamData.GF || 0) - (teamData.GA || 0);

  document.getElementById('page-title').textContent = `${team} — Roster`;
  document.title = `${team} Roster — VAHL`;

  document.getElementById('roster-hero').innerHTML = `
    <img src="${teamLogo(team)}" alt="${team}" style="width:240px;height:240px;flex-shrink:0;"/>
    <div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;">${team}</div>
      <div style="font-size:13px;color:var(--text-muted);"><span class="season-label">2026–27 Season</span></div>
      <div class="roster-hero-stats">
        <div class="rhs"><strong>${teamData.W ?? '–'}</strong>Wins</div>
        <div class="rhs"><strong>${teamData.L ?? '–'}</strong>Losses</div>
        <div class="rhs"><strong>${teamData.T ?? 0}</strong>Ties</div>
        <div class="rhs" style="margin-left:1.5rem;"><strong>${teamData.GF ?? '–'}</strong>GF</div>
        <div class="rhs"><strong>${teamData.GA ?? '–'}</strong>GA</div>
        <div class="rhs"><strong style="color:${diff>=0?'#16a34a':'#dc2626'}">${diff>0?'+':''}${diff}</strong>Diff</div>
      </div>
    </div>`;

  // ── SKATERS ──
  let skaterSort = 'pts', skaterDir = 1;
  const teamSkaters = skaters.filter(s => s.Team === team);

  function colVal(p, col) {
    if (col === 'pos') return p.Pos === 'D' ? 1 : 0;
    return Number(p[{g:'G',a:'A',pts:'PTS',pim:'PIM'}[col]] ?? 0);
  }

  function renderSkaters() {
    if (!teamSkaters.length) {
      document.getElementById('skaters-body').innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:1.5rem;">No skaters found</td></tr>';
      document.getElementById('skaters-foot').innerHTML = '';
      return;
    }
    const sorted = [...teamSkaters].sort((a,b) => {
      if (skaterSort === 'pos') {
        const aIsD = a.Pos === 'D', bIsD = b.Pos === 'D';
        if (skaterDir === 1) { if (aIsD !== bIsD) return aIsD ? 1 : -1; }
        else                 { if (aIsD !== bIsD) return aIsD ? -1 : 1; }
        return Number(b.PTS||0) - Number(a.PTS||0);
      }
      return skaterDir * (colVal(b,skaterSort) - colVal(a,skaterSort));
    });
    const highlightPTS = skaterSort === 'pts' || skaterSort === 'pos';
    document.getElementById('skaters-body').innerHTML = sorted.map(p => `
      <tr>
        <td class="left"><span class="jersey-num">${p.Jersey||'–'}</span></td>
        <td class="left"><a href="player.html?name=${encodeURIComponent(p.Name)}&team=${encodeURIComponent(p.Team)}" style="font-weight:500;color:var(--text);text-decoration:none;" onmouseover="this.style.color='#1e40af'" onmouseout="this.style.color='var(--text)'">${p.Name}</a></td>
        <td><span class="pos-badge">${p.Pos}</span></td>
        <td><span class="${skaterSort==='g'?'stat-hi':''}">${p.G}</span></td>
        <td><span class="${skaterSort==='a'?'stat-hi':''}">${p.A}</span></td>
        <td><span class="${highlightPTS?'stat-hi':''}">${p.PTS}</span></td>
        <td><span class="${skaterSort==='pim'?'stat-hi':''}">${p.PIM}</span></td>
      </tr>`).join('');

    // Totals row
    const tG   = teamSkaters.reduce((s,p)=>s+Number(p.G||0),0);
    const tA   = teamSkaters.reduce((s,p)=>s+Number(p.A||0),0);
    const tPTS = teamSkaters.reduce((s,p)=>s+Number(p.PTS||0),0);
    const tPIM = teamSkaters.reduce((s,p)=>s+Number(p.PIM||0),0);
    document.getElementById('skaters-foot').innerHTML = `
      <tr style="background:#eff6ff;color:#1e40af;font-weight:600;">
        <td class="left" colspan="3" style="padding:0.4rem 0.85rem;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#1e40af;">Total</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${tG}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${tA}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${tPTS}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${tPIM}</td>
      </tr>`;
  }

  // Wire up sortable headers
  document.querySelectorAll('#skaters-table th[data-col]').forEach(th => {
    th.style.cursor = 'pointer';
    if (!th.dataset.label) th.dataset.label = th.textContent.trim();
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      const defaultDir = col === 'pos' ? -1 : 1;
      skaterDir = skaterSort === col ? skaterDir * -1 : defaultDir;
      skaterSort = col;
      document.querySelectorAll('#skaters-table th[data-col]').forEach(t => {
        t.classList.remove('sorted');
        t.textContent = t.dataset.label;
      });
      th.classList.add('sorted');
      if (col === 'pos') {
        th.textContent = skaterDir === 1 ? 'Pos F↑' : 'Pos D↑';
      } else {
        th.textContent = th.dataset.label + (skaterDir === -1 ? ' ↓' : ' ↑');
      }
      renderSkaters();
    });
  });

  renderSkaters();

  // ── GOALIES ──
  const teamGoalies = goalies.filter(g => g.Team === team).sort((a,b) => a.GAA - b.GAA);
  if (!teamGoalies.length) {
    document.getElementById('goalies-body').innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text-muted);padding:1.5rem;">No goalies found</td></tr>';
    document.getElementById('goalies-foot').innerHTML = '';
  } else {
    document.getElementById('goalies-body').innerHTML = teamGoalies.map(g => `
      <tr>
        <td class="left"><span class="jersey-num">${g.Jersey||'–'}</span></td>
        <td class="left"><a href="player.html?name=${encodeURIComponent(g.Name)}&team=${encodeURIComponent(g.Team)}&type=goalie" style="font-weight:500;color:var(--text);text-decoration:none;" onmouseover="this.style.color='#1e40af'" onmouseout="this.style.color='var(--text)'">${g.Name}</a></td>
        <td>${g.W}</td><td>${g.L}</td><td>${g.T??0}</td>
        <td>${g.GA}</td>
        <td><span class="stat-hi">${Number(g.GAA).toFixed(2)}</span></td>
        <td>${g.SO}</td><td>${g.PIM}</td>
      </tr>`).join('');

    // Goalie totals
    const gW   = teamGoalies.reduce((s,g)=>s+Number(g.W||0),0);
    const gL   = teamGoalies.reduce((s,g)=>s+Number(g.L||0),0);
    const gT   = teamGoalies.reduce((s,g)=>s+Number(g.T||0),0);
    const gGA  = teamGoalies.reduce((s,g)=>s+Number(g.GA||0),0);
    const gSO  = teamGoalies.reduce((s,g)=>s+Number(g.SO||0),0);
    const gPIM = teamGoalies.reduce((s,g)=>s+Number(g.PIM||0),0);
    const gGP  = gW + gL + gT;
    const gGAA = gGP > 0 ? (gGA / gGP).toFixed(2) : '0.00';
    document.getElementById('goalies-foot').innerHTML = `
      <tr style="background:#eff6ff;color:#1e40af;font-weight:600;">
        <td class="left" colspan="2" style="padding:0.4rem 0.85rem;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#1e40af;">Total</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gW}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gL}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gT}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gGA}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gGAA}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gSO}</td>
        <td style="padding:0.4rem 0.85rem;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-align:center;color:#1e40af;">${gPIM}</td>
      </tr>`;
  }
}

async function init() {
  const data = await loadData();
  _rosterData = data;
  const params = new URLSearchParams(window.location.search);
  let activeTeam = params.get('team') || 'Toronto';
  if (!TEAMS.includes(activeTeam)) activeTeam = 'Toronto';

  function buildSwitcher() {
    document.getElementById('team-switcher').innerHTML = TEAMS.map(t => `
      <button class="ts-btn ${t===activeTeam?'active':''}" onclick="switchTeam('${t}')">
        <img src="${teamLogo(t)}" style="width:42px;height:42px;border-radius:50%;"/> ${t}
      </button>`).join('');
  }

  window.switchTeam = function(team) {
    activeTeam = team;
    _activeRosterTeam = team;
    history.replaceState(null,'',`?team=${encodeURIComponent(team)}`);
    buildSwitcher();
    renderTeam(team, _rosterData);
  };

  buildSwitcher();
  renderTeam(activeTeam, _rosterData);
}
init();

  // Apply dynamic season label from Google Sheet
  fetchSeason().then(s => {
    const label = s + ' Season';
    document.querySelectorAll('.season-label').forEach(el => el.textContent = label);
  });
</script>
</body>
</html>
